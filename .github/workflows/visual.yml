name: Visual Regression

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.sha }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  visual-regression:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Screenshot baselines + app assets are stored in Git LFS; fetch the
          # real PNGs (not pointer files) so the web export bundles real images
          # and toHaveScreenshot() compares against the actual baselines.
          lfs: true

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build web export
        # Mocks have been removed; the export pulls live data from the staging API.
        run: EXPO_PUBLIC_API_URL=https://api-staging.realty-ai.nl bun run export:web

      - name: Install Playwright
        run: bunx playwright install --with-deps chromium

      - name: Run visual regression tests
        run: bunx playwright test --config e2e/playwright.config.ts

      - name: Upload report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: |
            e2e/playwright-report/
            e2e/test-results/
          retention-days: 14
